{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Profile: {{ staff.full_name }}</h5>
                    <span class="badge bg-light text-dark">{{ staff.get_role_display }}</span>
                </div>
                <div class="card-body">
                    <form action="{% url 'staff-edit' staff.id %}" method="POST">
                        {% csrf_token %}
                        <input type="hidden" name="_method" value="PATCH">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="full_name" class="form-control" value="{{ staff.full_name }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" value="{{ staff.email }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Role</label>
                                <select name="role" class="form-select" required>
                                 <option value="REC" {% if staff.role == "REC" %}selected{% endif %}>Receptionist</option>
                                 <option value="CCO" {% if staff.role == "CCO" %}selected{% endif %}>Clinical Counsellor</option>
                                 <option value="FCO" {% if staff.role == "FCO" %}selected{% endif %}>Financial Counsellor</option>
                                 <option value="GYN" {% if staff.role == "GYN" %}selected{% endif %}>Gynaecologist</option>
                                <option value="EMB" {% if staff.role == "EMB" %}selected{% endif %}>Embryologist</option>
                                <option value="ANE" {% if staff.role == "ANE" %}selected{% endif %}>Anesthesiologist</option>
                                <option value="NUR" {% if staff.role == "NUR" %}selected{% endif %}>Nurse</option>
                                <option value="PHA" {% if staff.role == "PHA" %}selected{% endif %}>Pharmacist</option>
                                <option value="TEC" {% if staff.role == "TEC" %}selected{% endif %}>Lab Technician</option>
                                <option value="AND" {% if staff.role == "AND" %}selected{% endif %}>Andrology Lab Technician</option>
                                <option value="HRM" {% if staff.role == "HRM" %}selected{% endif %}>HR Manager</option>
                                <option value="ADM" {% if staff.role == "ADM" %}selected{% endif %}>System Admin</option>
                            </select>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'staff-list' %}" class="btn btn-light me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Records</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
