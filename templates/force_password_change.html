{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="width: 400px;">
        <div class="card-body p-5 text-center">
            <div class="mb-4">
                <i class="bi bi-shield-lock text-warning" style="font-size: 3rem;"></i>
            </div>
            <h4 class="fw-bold">Secure Your Account</h4>
            <p class="text-muted small">This is your first login. Please set a new permanent password to continue.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">New Password</label>
                    <input type="password" name="new_password" class="form-control" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Update & Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
