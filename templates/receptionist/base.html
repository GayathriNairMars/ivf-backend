

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IVF Clinic Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; }
        .nav-link { color: #bdc3c7; }
        .nav-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h4 class="text-center mb-4">IVF Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'appointments:receptionist_view-my-profile' %}">My Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'appointments:receptionist_view-dashboard' %}">
                        Dashboard
                        </a>
                    </li>
                    {% if user.role == 'REC' %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'appointments:receptionist_view-list' %}">
                            Patient/Donor Directory
                        </a>
                    </li>
                    {% endif %}
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post" id="logout-form" style="display: none;">
                        {% csrf_token %}
                        </form>
                        <a class="nav-link" href="#" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Logout</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
