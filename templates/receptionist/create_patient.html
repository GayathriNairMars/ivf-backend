{% extends 'receptionist/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">New Registration</h5>
                </div>
                <div class="card-body">
                    <form action="{% url 'appointments:receptionist_view-list' %}" method="POST">
                        {% csrf_token %}
                        
                        <!-- <div class="mb-3">
                            <label class="form-label">Registration Type</label>
                            <select name="role" class="form-select" required>
                                <option value="PAT">Patient</option>
                                <option value="DON">Donor</option>
                            </select>
                        </div> -->

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Temporary password" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Save Registration</button>
                            <a href="{% url 'appointments:receptionist_view-dashboard' %}" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
