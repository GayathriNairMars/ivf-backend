{% extends 'receptionist/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <h3>Receptionist Dashboard</h3>
            <p class="text-muted">Overview of Clinic Enrollment</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm bg-primary text-white">
                <div class="card-body py-4">
                    <h5 class="card-title opacity-75">Total Patients</h5>
                    <h1 class="display-3 fw-bold">{{ patients_count }}</h1>
                    <a href="{% url 'appointments:receptionist_view-list' %}" class="btn btn-light btn-sm mt-2">View Patients</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm bg-success text-white">
                <div class="card-body py-4">
                    <h5 class="card-title opacity-75">Total Donors</h5>
                    <h1 class="display-3 fw-bold">{{ donor_count }}</h1>
                    <a href="{% url 'appointments:receptionist_view-list' %}" class="btn btn-light btn-sm mt-2">View Donors</a>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-md-12">
            <div class="card shadow-sm border-0 p-4 text-center">
                <h5>Quick Actions</h5>
                <div class="mt-3">
                    <a href="{% url 'appointments:receptionist_view-onboard' %}" class="btn btn-outline-primary px-5 py-2">
                        + Register New Patient
                    </a>
                    <a href="{% url 'appointments:receptionist_view-onboard' %}" class="btn btn-outline-primary px-5 py-2">
                        + Register New Donor
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
